<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mikami OSINT</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: #0b0b0c;
    color: #e5e5e5;
    display: flex;
}

.sidebar {
    width: 220px;
    background: #0d0d0e;
    border-right: 1px solid #1a1a1a;
    padding: 20px;
    height: 100vh;
}

.logo span {
    color: #e11d48;
}

.menu div {
    margin: 15px 0;
    cursor: pointer;
}

.main {
    flex: 1;
    padding: 30px;
}

.card {
    background: #111113;
    border: 1px solid #1f1f22;
    border-radius: 14px;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

input {
    padding: 10px;
    background: #0f0f11;
    border: 1px solid #2a2a2e;
    border-radius: 8px;
    color: white;
}

button {
    margin-top: 15px;
    padding: 12px;
    background: #e11d48;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.result-card {
    margin-top: 15px;
    background: #111113;
    padding: 15px;
    border-radius: 10px;
}

.map {
    height: 200px;
    margin-top: 10px;
    border-radius: 10px;
    overflow: hidden;
}

.loader {
    border: 3px solid #222;
    border-top: 3px solid #e11d48;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo" style="text-align:center;">
        <img src="/static/logo.png" style="width:120px;">
    </div>

    <div class="menu">
        <div onclick="showSearch()">🔍 Recherche</div>
        <div onclick="loadHistory()">📜 Historique</div>
    </div>
</div>

<div class="main">

<div id="searchView" class="card">

<div class="grid">
    <input id="prenom" placeholder="Prénom">
    <input id="nom" placeholder="Nom">
    <input id="phone" placeholder="Téléphone">
    <input id="email" placeholder="Email">
    <input id="username" placeholder="Username">
    <input id="ip" placeholder="IP">
    <input id="city" placeholder="Ville">
</div>

<button onclick="search()">Lancer analyse</button>

<div id="status"></div>
</div>

<div id="results"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

function showSearch() {
    document.getElementById("results").innerHTML = "";
}

function buildAddress(person) {
    const adresse = person.adresse || person.adresse_complete || person.address || "";
    const codePostal = person.code_postal || "";
    const ville = person.ville || "";
    const pays = person.pays || "France";

    return [adresse, codePostal, ville, pays]
        .filter(v => v && String(v).trim() !== "")
        .join(" ");
}

function addMap(person, index) {
    const adresseComplete = buildAddress(person);

    if (!adresseComplete.trim()) return;

    fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(adresseComplete)}`)
        .then(res => res.json())
        .then(loc => {
            if (!loc || loc.length === 0) return;

            const lat = loc[0].lat;
            const lon = loc[0].lon;

            const map = L.map("map_" + index).setView([lat, lon], 13);

            setTimeout(() => {
                map.invalidateSize();
            }, 100);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            L.marker([lat, lon]).addTo(map);
        })
        .catch(() => {});
}

async function search() {

    document.getElementById("status").innerHTML = '<div class="loader"></div>';
    document.getElementById("results").innerHTML = "";

    const body = {};

    const fields = {
        prenom: "prenom",
        nom_famille: "nom",
        telephone: "phone",
        email: "email",
        nom_utilisateur: "username",
        adresse_ip: "ip",
        ville: "city"
    };

    for (let key in fields) {
        const value = document.getElementById(fields[key]).value;
        if (value) body[key] = value;
    }

    body.flexible = true;

    try {
        const res = await fetch("/search", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body)
        });

        const data = await res.json();

        document.getElementById("status").innerText = "Résultats";

        if (!data.data || !data.data.results || data.data.results.length === 0) {
            document.getElementById("results").innerHTML = `
                <div class="result-card">Aucun résultat trouvé</div>
            `;
            return;
        }

        data.data.results.forEach((person, index) => {
            const div = document.createElement("div");
            div.className = "result-card";

            let html = "";

            for (const key in person) {
                if (!key.startsWith("_")) {
                    html += `<p><b>${key}:</b> ${person[key]}</p>`;
                }
            }

            html += `<div id="map_${index}" class="map"></div>`;

            div.innerHTML = html;
            document.getElementById("results").appendChild(div);

            addMap(person, index);
        });

    } catch (error) {
        document.getElementById("status").innerText = "Erreur";
        document.getElementById("results").innerHTML = `
            <div class="result-card">Erreur lors de la recherche</div>
        `;
    }
}

async function loadHistory() {

    document.getElementById("results").innerHTML = "Chargement...";

    const res = await fetch("/history");
    const data = await res.json();

    let html = "";

    data.reverse().forEach(item => {
        html += `<div class="result-card">
            <b>Recherche:</b> ${JSON.stringify(item.query)}
        </div>`;
    });

    document.getElementById("results").innerHTML = html;
}

</script>

</body>
</html>
