<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mikami Justice</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0d0d0d;
    color: #eaeaea;
}

header {
    padding: 20px;
    background: #111;
    border-bottom: 1px solid #222;
    text-align: center;
    font-size: 22px;
    letter-spacing: 2px;
    color: #ff1a1a;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 30px;
}

.search-box {
    background: #141414;
    padding: 25px;
    border-radius: 12px;
    border: 1px solid #222;
    box-shadow: 0 0 20px rgba(255,0,0,0.1);
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 8px;
    color: white;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    background: linear-gradient(90deg, #ff0000, #990000);
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    opacity: 0.8;
}

.status {
    margin-top: 15px;
    color: #aaa;
}

.result-card {
    background: #141414;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: 0 0 15px rgba(255,0,0,0.05);
}

.result-card h3 {
    color: #ff1a1a;
}

.map {
    height: 250px;
    margin-top: 10px;
    border-radius: 10px;
    overflow: hidden;
}
</style>
</head>

<body>

<header>
☠ MIKAMI JUSTICE ☠
</header>

<div class="container">

<div class="search-box">
<input id="prenom" placeholder="Prénom">
<input id="nom" placeholder="Nom">
<input id="phone" placeholder="Téléphone">
<input id="email" placeholder="Email">
<input id="username" placeholder="Username">
<input id="ip" placeholder="IP">
<input id="city" placeholder="Ville">

<button onclick="search()">JUDGEMENT</button>

<p id="status" class="status"></p>
</div>

<div id="results"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
async function search() {

    document.getElementById("status").innerHTML = "Analyse en cours...";
    document.getElementById("results").innerHTML = "";

    const body = {};

    const fields = {
        prenom: "prenom",
        nom_famille: "nom",
        telephone: "phone",
        email: "email",
        nom_utilisateur: "username",
        adresse_ip: "ip",
        ville: "city"
    };

    for (let key in fields) {
        const value = document.getElementById(fields[key]).value;
        if (value) body[key] = value;
    }

    body.flexible = true;

    const res = await fetch("/search", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
    });

    const data = await res.json();

    if (!data.data || data.data.results.length === 0) {
        document.getElementById("status").innerHTML = "Aucun résultat.";
        return;
    }

    document.getElementById("status").innerHTML = "Résultats trouvés";

    data.data.results.forEach((person, index) => {

        const div = document.createElement("div");
        div.className = "result-card";

        let html = "<h3>Profil détecté</h3>";

        for (const key in person) {
            if (!key.startsWith("_")) {
                html += `<p><b>${key}:</b> ${person[key]}</p>`;
            }
        }

        html += `<div id="map_${index}" class="map"></div>`;

        div.innerHTML = html;
        document.getElementById("results").appendChild(div);

        const adresse = person.adresse || person.ville || "";

        if (!adresse) return;

        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(adresse)}`)
            .then(res => res.json())
            .then(loc => {
                if (loc.length === 0) return;

                const lat = loc[0].lat;
                const lon = loc[0].lon;

                const map = L.map("map_" + index).setView([lat, lon], 13);

                setTimeout(() => {
                    map.invalidateSize();
                }, 100);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                L.marker([lat, lon]).addTo(map);
            });
    });
}
</script>

</body>
</html>
